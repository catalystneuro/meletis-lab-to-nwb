  experiment_description:
    Arrow maze choice task (T-maze) for studying reward-based learning and motor function.
    Water-restricted mice navigated a modified T-maze (40x40 cm box with transparent floor)
    with two lateral corridors branching from a central corridor. Each corridor was equipped with
    a waterspout delivering 3 uL water drops. At trial initiation, mice received one drop in the
    central corridor, then chose between lateral corridors (only left was rewarded). Mice were
    trained over 4 consecutive days in 10-minute sessions. Two cohorts were tested — a 6-OHDA
    dopamine lesion model (WT mice) and an Anxa1-TetTox genetic dopamine neuron ablation
    model (Anxa1-Flp mice). Sessions were recorded from below at 30 fps using an Oryx 10GigE
    camera (Hamamatsu Photonics), and pose estimation was performed using DeepLabCut.
  session_description:
    Arrow maze choice task (T-maze) session. A water-restricted mouse navigated a T-maze
    with two lateral corridors, learning to associate the left corridor with a water reward over
    4 consecutive days. Recorded from below at 30 fps with pose estimation via DeepLabCut.
